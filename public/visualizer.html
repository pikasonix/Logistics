<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDPTW Visualizer</title>

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Tailwind CSS -->

    <!-- Custom CSS -->
    <link rel="stylesheet" href="/src/style-minimal.css">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#3b82f6',
                        secondary: '#1e40af',
                        success: '#10b981',
                        warning: '#f59e0b',
                        danger: '#ef4444',
                    }
                }
            }
        }
    </script>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.7.1/dist/leaflet.css"

        crossorigin="" />
    <link rel="stylesheet" href="/src/shapes-tailwind.css" />
    <link rel="stylesheet" href="/src/style-minimal.css" />
    <script src="https://unpkg.com/leaflet@1.7.1/dist/leaflet.js"
        integrity="sha512-XQoYMqMTK8LvdxXYG3nZ448hOEQiglfqkJs1NOQV44cWnUrBc8PkAOcXy20w0vlaXaVUearIOBhiXZ5V3ynxwA=="
        crossorigin=""></script>

    <script type="text/javascript"
        src="https://unpkg.com/vis-timeline@latest/peer/umd/vis-timeline-graph2d.min.js"></script>

<body class="bg-gray-100 font-sans">
    <div class="flex h-screen">
        <!-- Sidebar -->
        <div class="w-80 bg-white shadow-xl border-r border-gray-200 flex flex-col overflow-hidden">
            <!-- Header -->
            <div class="bg-gradient-to-r from-blue-600 to-purple-600 text-white p-6">
                <div class="flex items-center space-x-3">
                    <i class="fas fa-route text-2xl"></i>
                    <h1 class="text-xl font-bold">PDPTW Visualizer</h1>
                </div>
            </div>

            <!-- Sidebar Content -->
            <div class="flex-1 overflow-y-auto">
                <!-- Load Instance Section -->
                <div class="p-4 border-b border-gray-200">
                    <button onclick="document.getElementById('load_instance').click()"
                        class="w-full flex items-center space-x-3 px-4 py-3 bg-gray-50 hover:bg-gray-100 rounded-lg transition-colors duration-200">
                        <i class="fa fa-folder-open text-blue-600"></i>
                        <span class="font-medium text-gray-700">Load Instance</span>
                    </button>
                </div>

                <!-- Instance Form -->
                <div class="p-4 border-b border-gray-200">
                    <form id="instance-form" onsubmit="runInstance(event)" class="space-y-4">
                        <!-- Instance Textarea -->
                        <div>
                            <label for="instance_textarea"
                                class="flex items-center space-x-2 text-sm font-medium text-gray-700 mb-2">
                                <i class="fas fa-edit text-blue-600"></i>
                                <span>Nhập nội dung instance:</span>
                            </label>
                            <textarea id="instance_textarea" rows="6"
                                class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent resize-none text-sm font-mono"
                                placeholder="Paste nội dung instance.txt hoặc click 'Load ví dụ' để thử..."></textarea>
                        </div>

                        <!-- Load Sample Button -->
                        <button type="button" onclick="loadSampleInstance()"
                            class="w-full flex items-center justify-center space-x-2 px-4 py-2 bg-blue-600 hover:bg-blue-700 text-white rounded-md transition-colors duration-200">
                            <i class="fas fa-download"></i>
                            <span>Load ví dụ instance</span>
                        </button>

                        <!-- Parameters Section -->
                        <div>
                            <label class="flex items-center space-x-2 text-sm font-medium text-gray-700 mb-3">
                                <i class="fas fa-cog text-blue-600"></i>
                                <span>Tham số thuật toán:</span>
                            </label>

                            <!-- Parameters Grid -->
                            <div class="space-y-3">
                                <div class="flex items-center justify-between">
                                    <label class="text-xs text-gray-600 w-32" title="Số lượng routes ban đầu để thử">Số
                                        routes:</label>
                                    <input type="number" id="num_routes" name="num_routes" value="7"
                                        class="w-20 px-2 py-1 text-xs border border-gray-300 rounded focus:outline-none focus:ring-1 focus:ring-blue-500"
                                        min="1" required />
                                </div>

                                <div class="flex items-center justify-between">
                                    <label class="text-xs text-gray-600 w-32"
                                        title="Số lượng kiến trong thuật toán ACO">Số kiến:</label>
                                    <input type="number" id="ants" name="ants" value="10"
                                        class="w-20 px-2 py-1 text-xs border border-gray-300 rounded focus:outline-none focus:ring-1 focus:ring-blue-500"
                                        min="1" required />
                                </div>

                                <div class="flex items-center justify-between">
                                    <label class="text-xs text-gray-600 w-32"
                                        title="Số vòng lặp tối đa của thuật toán">Số vòng lặp:</label>
                                    <input type="number" id="iterations" name="iterations" value="20"
                                        class="w-20 px-2 py-1 text-xs border border-gray-300 rounded focus:outline-none focus:ring-1 focus:ring-blue-500"
                                        min="1" required />
                                </div>

                                <div class="flex items-center justify-between">
                                    <label class="text-xs text-gray-600 w-32"
                                        title="Hệ số ảnh hưởng của pheromone">Alpha (α):</label>
                                    <input type="number" id="alpha" name="alpha" value="2.0"
                                        class="w-20 px-2 py-1 text-xs border border-gray-300 rounded focus:outline-none focus:ring-1 focus:ring-blue-500"
                                        step="0.1" required />
                                </div>

                                <div class="flex items-center justify-between">
                                    <label class="text-xs text-gray-600 w-32" title="Hệ số ảnh hưởng của heuristic">Beta
                                        (β):</label>
                                    <input type="number" id="beta" name="beta" value="5.0"
                                        class="w-20 px-2 py-1 text-xs border border-gray-300 rounded focus:outline-none focus:ring-1 focus:ring-blue-500"
                                        step="0.1" required />
                                </div>

                                <div class="flex items-center justify-between">
                                    <label class="text-xs text-gray-600 w-32" title="Hệ số bay hơi pheromone (0-1)">Rho
                                        (ρ):</label>
                                    <input type="number" id="rho" name="rho" value="0.1"
                                        class="w-20 px-2 py-1 text-xs border border-gray-300 rounded focus:outline-none focus:ring-1 focus:ring-blue-500"
                                        step="0.01" required />
                                </div>

                                <div class="flex items-center justify-between">
                                    <label class="text-xs text-gray-600 w-32" title="Giá trị pheromone tối đa">τ
                                        max:</label>
                                    <input type="number" id="tau_max" name="tau_max" value="50.0"
                                        class="w-20 px-2 py-1 text-xs border border-gray-300 rounded focus:outline-none focus:ring-1 focus:ring-blue-500"
                                        step="0.1" required />
                                </div>

                                <div class="flex items-center justify-between">
                                    <label class="text-xs text-gray-600 w-32" title="Giá trị pheromone tối thiểu">τ
                                        min:</label>
                                    <input type="number" id="tau_min" name="tau_min" value="0.01"
                                        class="w-20 px-2 py-1 text-xs border border-gray-300 rounded focus:outline-none focus:ring-1 focus:ring-blue-500"
                                        step="0.001" required />
                                </div>

                                <div class="flex items-center justify-between">
                                    <label class="text-xs text-gray-600 w-32" title="Xác suất chọn greedy (0-1)">Greedy
                                        bias:</label>
                                    <input type="number" id="greedy_bias" name="greedy_bias" value="0.85"
                                        class="w-20 px-2 py-1 text-xs border border-gray-300 rounded focus:outline-none focus:ring-1 focus:ring-blue-500"
                                        step="0.01" min="0" max="1" required />
                                </div>

                                <div class="flex items-center justify-between">
                                    <label class="text-xs text-gray-600 w-32"
                                        title="Số solution tốt nhất để cập nhật pheromone">Elite solutions:</label>
                                    <input type="number" id="elite_solutions" name="elite_solutions" value="4"
                                        class="w-20 px-2 py-1 text-xs border border-gray-300 rounded focus:outline-none focus:ring-1 focus:ring-blue-500"
                                        min="1" required />
                                </div>

                                <div class="flex items-center justify-between">
                                    <label class="text-xs text-gray-600 w-32"
                                        title="Xác suất áp dụng local search (0-1)">Local search prob:</label>
                                    <input type="number" id="local_search_prob" name="local_search_prob" value="0.7"
                                        class="w-20 px-2 py-1 text-xs border border-gray-300 rounded focus:outline-none focus:ring-1 focus:ring-blue-500"
                                        step="0.01" min="0" max="1" required />
                                </div>

                                <div class="flex items-center justify-between">
                                    <label class="text-xs text-gray-600 w-32"
                                        title="Số vòng lặp không cải thiện để restart">Restart threshold:</label>
                                    <input type="number" id="restart_threshold" name="restart_threshold" value="2"
                                        class="w-20 px-2 py-1 text-xs border border-gray-300 rounded focus:outline-none focus:ring-1 focus:ring-blue-500"
                                        min="1" required />
                                </div>
                            </div>
                        </div>

                        <!-- Action Buttons -->
                        <div class="space-y-2">
                            <button type="submit"
                                class="w-full flex items-center justify-center space-x-2 px-4 py-3 bg-green-600 hover:bg-green-700 text-white rounded-md transition-colors duration-200 font-medium">
                                <i class="fas fa-play"></i>
                                <span>Chạy giải bài toán</span>
                            </button>

                            <button type="button" onclick="resetParameters()"
                                class="w-full flex items-center justify-center space-x-2 px-4 py-2 bg-orange-500 hover:bg-orange-600 text-white rounded-md transition-colors duration-200">
                                <i class="fas fa-undo"></i>
                                <span>Reset tham số mặc định</span>
                            </button>
                        </div>
                    </form>
                </div>

                <!-- Load Solution Section -->
                <div class="p-4 border-b border-gray-200">
                    <button id="load_solution_btn" onclick="document.getElementById('load_solution').click()"
                        class="w-full flex items-center space-x-3 px-4 py-3 bg-gray-50 hover:bg-gray-100 rounded-lg transition-colors duration-200">
                        <i class="fa fa-file-alt text-blue-600"></i>
                        <span class="font-medium text-gray-700">Load Solution</span>
                    </button>
                </div>

                <!-- Nodes Section -->
                <div class="border-b border-gray-200">
                    <button id="nodes_button" onclick="toggleDropdown('nodes')"
                        class="w-full flex items-center justify-between px-4 py-3 hover:bg-gray-50 transition-colors duration-200">
                        <div class="flex items-center space-x-3">
                            <i class="fa fa-map-marker-alt text-blue-600"></i>
                            <span class="font-medium text-gray-700">Nodes</span>
                        </div>
                        <i id="nodes-icon"
                            class="fa fa-angle-down text-gray-400 transform transition-transform duration-200"></i>
                    </button>
                    <div id="nodes_dropdown" class="hidden bg-gray-50 max-h-40 overflow-y-auto"></div>
                </div> <!-- Routes Section -->
                <div class="border-b border-gray-200">
                    <button id="routes_button" onclick="toggleDropdown('routes')"
                        class="w-full flex items-center justify-between px-4 py-3 hover:bg-gray-50 transition-colors duration-200">
                        <div class="flex items-center space-x-3">
                            <i class="fa fa-route text-blue-600"></i>
                            <span class="font-medium text-gray-700">Routes</span>
                        </div>
                        <i id="routes-icon"
                            class="fa fa-angle-down text-gray-400 transform transition-transform duration-200"></i>
                    </button>
                    <div id="routes_dropdown" class="hidden bg-gray-50 max-h-40 overflow-y-auto"></div>
                </div>

                <!-- Route Analysis Section -->
                <div id="route_analysis_section" class="border-b border-gray-200" style="display: none;">
                    <button onclick="toggleDropdown('analysis')"
                        class="w-full flex items-center justify-between px-4 py-3 hover:bg-gray-50 transition-colors duration-200">
                        <div class="flex items-center space-x-3">
                            <i class="fas fa-chart-line text-blue-600"></i>
                            <span class="font-medium text-gray-700">Phân tích Routes</span>
                        </div>
                        <i id="analysis-icon"
                            class="fa fa-angle-down text-gray-400 transform transition-transform duration-200"></i>
                    </button>
                    <div id="analysis_dropdown" class="hidden bg-gray-50">
                        <div id="routes_analysis_list" class="max-h-60 overflow-y-auto p-2 space-y-2">
                            <!-- Route analysis content will be populated here -->
                        </div>
                    </div>
                </div>
            </div>

            <!-- Hidden File Inputs -->
            <input type="file" id="load_instance" class="hidden" title="Select instance file" accept=".txt"
                onchange="read_instance_file(this)">
            <input type="file" id="load_solution" class="hidden" title="Select solution file" accept=".txt"
                onchange="read_solution_file(this)">
        </div>

        <!-- Map Container -->
        <div class="flex-1 relative">
            <div id="map" class="w-full h-full rounded-l-lg shadow-inner"></div>
        </div>
    </div>

    <!-- Scripts -->
    <script type="text/javascript" src="/src/general.js"></script>
    <script type="text/javascript" src="/src/structures.js"></script>
    <script type="text/javascript" src="/src/reader.js"></script>
    <script type="text/javascript" src="/src/mapper.js"></script>

    <script type="text/javascript">
        window.onload = startup;        // Toggle dropdown function
        function toggleDropdown(section) {
            const dropdown = document.getElementById(section + '_dropdown');
            const icon = document.getElementById(section + '-icon');

            if (dropdown.classList.contains('hidden')) {
                // Populate menu items when opening
                if (section === 'nodes' && typeof list_nodes_in_menu === 'function') list_nodes_in_menu();
                if (section === 'routes' && typeof list_routes_in_menu === 'function') list_routes_in_menu();
                if (section === 'analysis') populateRouteAnalysis();
                dropdown.classList.remove('hidden');
                icon.classList.add('rotate-180');
            } else {
                dropdown.classList.add('hidden');
                icon.classList.remove('rotate-180');

                // Clear node selection khi đóng nodes dropdown
                if (section === 'nodes') {
                    clearNodeSelection();
                }
            }
        }

        // Function để clear node selection
        function clearNodeSelection() {
            const nodeItems = document.querySelectorAll('#nodes_dropdown .node-item');
            nodeItems.forEach(item => {
                item.classList.remove('selected');
            });

            // Clear highlights trên map nếu có
            if (typeof clear_node_selection === 'function') {
                clear_node_selection(null);
            }
        }

        function runInstance(event) {
            event.preventDefault();
            const instance = document.getElementById('instance_textarea').value;

            if (!instance.trim()) {
                alert('Vui lòng nhập nội dung instance!');
                return;
            }

            const params = {
                num_routes: parseInt(document.getElementById('num_routes').value),
                ants: parseInt(document.getElementById('ants').value),
                iterations: parseInt(document.getElementById('iterations').value),
                alpha: parseFloat(document.getElementById('alpha').value),
                beta: parseFloat(document.getElementById('beta').value),
                rho: parseFloat(document.getElementById('rho').value),
                tau_max: parseFloat(document.getElementById('tau_max').value),
                tau_min: parseFloat(document.getElementById('tau_min').value),
                greedy_bias: parseFloat(document.getElementById('greedy_bias').value),
                elite_solutions: parseInt(document.getElementById('elite_solutions').value),
                local_search_prob: parseFloat(document.getElementById('local_search_prob').value),
                restart_threshold: parseInt(document.getElementById('restart_threshold').value)
            };

            console.log('Sending parameters:', params);

            // Hiển thị loading
            const submitBtn = event.target.querySelector('button[type="submit"]');
            const originalText = submitBtn.innerHTML;
            submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i><span>Đang xử lý...</span>';
            submitBtn.disabled = true;
            submitBtn.classList.add('opacity-75', 'cursor-not-allowed');
            fetch('/solve', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ instance, params })
            })
                .then(res => {
                    if (!res.ok) {
                        // Get text first, as .json() will fail if not JSON, obscuring the real error
                        return res.text().then(text => {
                            let errorMsg = `Server responded with ${res.status}: ${text || 'No specific error message from server.'}`;
                            try {
                                // If the text is JSON, try to parse it for a more specific error
                                const errData = JSON.parse(text);
                                if (errData && errData.error) {
                                    errorMsg = `Server error: ${errData.error}`;
                                }
                            } catch (e) {
                                // Not JSON or failed to parse, use the text directly
                            }
                            throw new Error(errorMsg);
                        });
                    }
                    return res.json();
                })
                .then(data => {
                    // Khôi phục button
                    submitBtn.innerHTML = originalText;
                    submitBtn.disabled = false;
                    submitBtn.classList.remove('opacity-75', 'cursor-not-allowed');

                    if (data.success) {
                        // Tự động nạp solution trả về vào visualizer
                        if (data.result) {
                            console.log('Solution received, loading into visualizer...');

                            // Đảm bảo instance đã được load trước khi load solution
                            if (typeof instance_loaded === 'undefined' || !instance_loaded) {
                                console.log('Instance not loaded, loading instance first...');

                                // Tạo fake input để load instance
                                const instanceBlob = new Blob([instance], { type: 'text/plain' });
                                const instanceFile = new File([instanceBlob], 'instance.txt', { type: 'text/plain' });
                                const fakeInstanceInput = { files: [instanceFile] };

                                // Load instance trước
                                if (typeof read_instance_file === 'function') {
                                    read_instance_file(fakeInstanceInput, function () {
                                        loadSolutionFromText(data.result);
                                        alert('Giải bài toán thành công! Kết quả đã được hiển thị trên bản đồ.');
                                    });
                                } else {
                                    alert('Không tìm thấy hàm read_instance_file!');
                                }
                            } else {
                                // Instance đã có sẵn, load solution ngay
                                loadSolutionFromText(data.result);
                                alert('Giải bài toán thành công! Kết quả đã được hiển thị trên bản đồ.');
                            }
                        } else {
                            alert('Đã giải xong nhưng không có dữ liệu kết quả!');
                        }
                    } else {
                        alert('Lỗi: ' + data.error);
                    }
                })
                .catch(err => {
                    // Khôi phục button khi có lỗi
                    submitBtn.innerHTML = originalText;
                    submitBtn.disabled = false;
                    submitBtn.classList.remove('opacity-75', 'cursor-not-allowed');
                    alert('Lỗi xử lý yêu cầu: ' + err.message); // More specific error
                });
        }

        // Hàm reset tham số về giá trị mặc định
        function resetParameters() {
            document.getElementById('num_routes').value = 7;
            document.getElementById('ants').value = 10;
            document.getElementById('iterations').value = 20;
            document.getElementById('alpha').value = 2.0;
            document.getElementById('beta').value = 5.0;
            document.getElementById('rho').value = 0.1;
            document.getElementById('tau_max').value = 50.0;
            document.getElementById('tau_min').value = 0.01;
            document.getElementById('greedy_bias').value = 0.85;
            document.getElementById('elite_solutions').value = 4;
            document.getElementById('local_search_prob').value = 0.7; document.getElementById('restart_threshold').value = 2;
        }        // Hiển thị phần phân tích routes
        function showRouteAnalysisSection() {
            const analysisSection = document.getElementById('route_analysis_section');
            if (analysisSection) {
                analysisSection.style.display = 'block';
            }
        }        // Populate route analysis
        function populateRouteAnalysis() {
            console.log('populateRouteAnalysis called');
            const container = document.getElementById('routes_analysis_list');
            if (!container) {
                console.log('Container not found');
                return;
            }

            if (!solution || !solution.routes) {
                console.log('Solution or routes not found:', solution);
                return;
            }

            console.log('Found solution with routes:', solution.routes.length);
            container.innerHTML = '';

            solution.routes.forEach((route, index) => {
                console.log(`Processing route ${index}:`, route);
                // Kiểm tra route.sequence thay vì route.nodes
                if (route.sequence && route.sequence.length > 2) { // Bỏ qua routes chỉ có depot
                    const routeDiv = document.createElement('div');
                    routeDiv.className = 'bg-white border border-gray-200 rounded-lg p-3 cursor-pointer hover:bg-blue-50 transition-colors duration-200';
                    routeDiv.onclick = () => showRouteDetails(index, route);

                    const routeHeader = document.createElement('div');
                    routeHeader.className = 'flex items-center justify-between mb-2';

                    const routeTitle = document.createElement('h4');
                    routeTitle.className = 'font-semibold text-gray-800';
                    routeTitle.textContent = `Route ${index + 1}`;

                    const routeStats = document.createElement('div');
                    routeStats.className = 'text-xs text-gray-600';

                    const totalDistance = calculateRouteDistance(route);
                    const totalLoad = calculateMaxLoad(route);

                    routeStats.innerHTML = `
                        <div>Khoảng cách: ${totalDistance.toFixed(1)}</div>
                        <div>Tải trọng max: ${totalLoad}</div>
                    `;

                    routeHeader.appendChild(routeTitle);
                    routeHeader.appendChild(routeStats);

                    const nodeSequence = document.createElement('div');
                    nodeSequence.className = 'text-xs text-gray-500';
                    nodeSequence.textContent = `Nodes: ${route.sequence.join(' → ')}`;

                    routeDiv.appendChild(routeHeader);
                    routeDiv.appendChild(nodeSequence);
                    container.appendChild(routeDiv);
                }
            });
        }

        // Hiển thị chi tiết route
        function showRouteDetails(routeIndex, route) {
            const modal = createRouteDetailModal(routeIndex, route);
            document.body.appendChild(modal);
        }

        // Tạo modal hiển thị chi tiết route
        function createRouteDetailModal(routeIndex, route) {
            const modal = document.createElement('div');
            modal.className = 'fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 p-4';
            modal.onclick = (e) => {
                if (e.target === modal) {
                    document.body.removeChild(modal);
                }
            };

            const content = document.createElement('div');
            content.className = 'bg-white rounded-lg max-w-4xl w-full max-h-[90vh] overflow-y-auto';

            const header = document.createElement('div');
            header.className = 'flex items-center justify-between p-6 border-b border-gray-200';
            header.innerHTML = `
                <h2 class="text-xl font-bold text-gray-800">Chi tiết Route ${routeIndex + 1}</h2>
                <button onclick="document.body.removeChild(this.closest('.fixed'))" 
                        class="text-gray-400 hover:text-gray-600">
                    <i class="fas fa-times text-xl"></i>
                </button>
            `;

            const body = document.createElement('div');
            body.className = 'p-6';

            // Tạo bảng chi tiết
            const table = createRouteDetailTable(route);
            body.appendChild(table);

            content.appendChild(header);
            content.appendChild(body);
            modal.appendChild(content);

            return modal;
        }

        // Tạo bảng chi tiết route
        function createRouteDetailTable(route) {
            const tableContainer = document.createElement('div');
            tableContainer.className = 'overflow-x-auto';

            const table = document.createElement('table');
            table.className = 'w-full border-collapse border border-gray-300';

            // Header
            const thead = document.createElement('thead');
            thead.innerHTML = `
                <tr class="bg-gray-50">
                    <th class="border border-gray-300 px-4 py-2 text-left">Thứ tự</th>
                    <th class="border border-gray-300 px-4 py-2 text-left">Node ID</th>
                    <th class="border border-gray-300 px-4 py-2 text-left">Loại</th>
                    <th class="border border-gray-300 px-4 py-2 text-left">Thời gian đến</th>
                    <th class="border border-gray-300 px-4 py-2 text-left">Thời gian phục vụ</th>
                    <th class="border border-gray-300 px-4 py-2 text-left">Khối lượng xe</th>
                    <th class="border border-gray-300 px-4 py-2 text-left">Khoảng cách</th>
                </tr>
            `;
            table.appendChild(thead);

            // Body
            const tbody = document.createElement('tbody');
            let currentLoad = 0;
            let currentTime = 0;
            let totalDistance = 0; route.sequence.forEach((nodeId, index) => {
                const node = instance ? instance.nodes[nodeId] : null;
                const row = document.createElement('tr');
                row.className = index % 2 === 0 ? 'bg-white' : 'bg-gray-50';

                // Tính toán thông tin
                let nodeType = 'Depot';
                let demand = 0;
                let serviceTime = 0;
                let distanceFromPrev = 0;

                if (node) {
                    if (nodeId === 0) {
                        nodeType = 'Depot';
                    } else if (node.demand > 0) {
                        nodeType = 'Pickup';
                        demand = node.demand;
                    } else {
                        nodeType = 'Delivery';
                        demand = node.demand;
                    }
                    serviceTime = node.service_time || 0;
                }

                // Tính khoảng cách từ node trước
                if (index > 0 && instance && instance.times) {
                    const prevNodeId = route.sequence[index - 1];
                    distanceFromPrev = instance.times[prevNodeId] ? instance.times[prevNodeId][nodeId] || 0 : 0;
                    totalDistance += distanceFromPrev;
                    currentTime += distanceFromPrev;
                }

                // Cập nhật tải trọng
                currentLoad += demand;

                // Thời gian bắt đầu phục vụ (tính cả thời gian chờ nếu có)
                let serviceStartTime = currentTime;
                if (node && node.ready_time) {
                    serviceStartTime = Math.max(currentTime, node.ready_time);
                }

                row.innerHTML = `
                    <td class="border border-gray-300 px-4 py-2">${index + 1}</td>
                    <td class="border border-gray-300 px-4 py-2 font-mono">${nodeId}</td>
                    <td class="border border-gray-300 px-4 py-2">
                        <span class="px-2 py-1 rounded text-xs ${getNodeTypeColor(nodeType)}">${nodeType}</span>
                    </td>
                    <td class="border border-gray-300 px-4 py-2">${serviceStartTime.toFixed(1)}</td>
                    <td class="border border-gray-300 px-4 py-2">${serviceTime}</td>
                    <td class="border border-gray-300 px-4 py-2 font-mono">${currentLoad}</td>
                    <td class="border border-gray-300 px-4 py-2">${distanceFromPrev.toFixed(1)}</td>
                `;

                // Cập nhật thời gian hiện tại sau khi phục vụ
                currentTime = serviceStartTime + serviceTime;

                tbody.appendChild(row);
            });

            table.appendChild(tbody);

            // Footer với tổng kết
            const tfoot = document.createElement('tfoot');
            tfoot.innerHTML = `
                <tr class="bg-blue-50 font-semibold">
                    <td class="border border-gray-300 px-4 py-2" colspan="6">Tổng khoảng cách</td>
                    <td class="border border-gray-300 px-4 py-2">${totalDistance.toFixed(1)}</td>
                </tr>
                <tr class="bg-blue-50 font-semibold">
                    <td class="border border-gray-300 px-4 py-2" colspan="6">Tổng thời gian</td>
                    <td class="border border-gray-300 px-4 py-2">${currentTime.toFixed(1)}</td>
                </tr>
            `;
            table.appendChild(tfoot);

            tableContainer.appendChild(table);
            return tableContainer;
        }

        // Lấy màu sắc cho loại node
        function getNodeTypeColor(nodeType) {
            switch (nodeType) {
                case 'Depot': return 'bg-gray-200 text-gray-800';
                case 'Pickup': return 'bg-green-200 text-green-800';
                case 'Delivery': return 'bg-blue-200 text-blue-800';
                default: return 'bg-gray-200 text-gray-800';
            }
        }        // Tính khoảng cách route
        function calculateRouteDistance(route) {
            if (!route.sequence || !instance || !instance.times) return 0;

            let totalDistance = 0;
            for (let i = 1; i < route.sequence.length; i++) {
                const fromNode = route.sequence[i - 1];
                const toNode = route.sequence[i];
                if (instance.times[fromNode] && instance.times[fromNode][toNode]) {
                    totalDistance += instance.times[fromNode][toNode];
                }
            }
            return totalDistance;
        }

        // Tính tải trọng tối đa
        function calculateMaxLoad(route) {
            if (!route.sequence || !instance || !instance.nodes) return 0;

            let currentLoad = 0;
            let maxLoad = 0;

            route.sequence.forEach(nodeId => {
                const node = instance.nodes[nodeId];
                if (node && node.demand) {
                    currentLoad += node.demand;
                    maxLoad = Math.max(maxLoad, currentLoad);
                }
            });

            return maxLoad;
        }

        // Hàm nạp solution từ text (giả lập file solution)
        function loadSolutionFromText(solutionText) {
            try {
                console.log('Loading solution from text:', solutionText);

                // Tạo một Blob từ text kết quả
                const blob = new Blob([solutionText], { type: 'text/plain' });
                const file = new File([blob], 'solution.txt', { type: 'text/plain' });

                console.log('Created file object:', file);

                // Kiểm tra xem reader đã tồn tại chưa
                if (typeof reader === 'undefined') {
                    console.error('Reader not found, trying to initialize...');
                    // Thử khởi tạo reader nếu chưa có
                    if (typeof Reader !== 'undefined') {
                        reader = new Reader();
                    } else {
                        alert('Lỗi: Reader chưa được khởi tạo!');
                        return;
                    }
                }                // Callback sau khi load solution thành công
                var after_loading_solution = function () {
                    console.log('Solution loaded successfully');
                    solution = reader.solution;
                    is_solution_loaded = true;
                    routes_showing = true;
                    routes_filled = true;

                    // Kích hoạt các button và hiển thị solution
                    if (typeof enable_solution_buttons === 'function') {
                        enable_solution_buttons(true);
                    }
                    if (typeof select_button === 'function' && typeof show_routes_btn !== 'undefined') {
                        select_button(show_routes_btn, true);
                    }
                    if (typeof select_button === 'function' && typeof fill_routes_btn !== 'undefined') {
                        select_button(fill_routes_btn, true);
                    }
                    if (typeof draw_solution === 'function') {
                        draw_solution(solution);
                    }
                    if (typeof activate_routes_list === 'function') {
                        activate_routes_list();
                    }
                    if (typeof list_routes_in_menu === 'function') {
                        list_routes_in_menu();
                    }

                    // Hiển thị phần phân tích routes
                    showRouteAnalysisSection();

                    console.log('Solution visualization completed');
                }

                // Gọi reader để đọc solution
                reader.read_solution(file, after_loading_solution);

            } catch (error) {
                console.error('Error in loadSolutionFromText:', error);
                alert('Lỗi khi load solution: ' + error.message);
            }
        }
